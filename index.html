<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Underwater VR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<a-scene fog="type: exponential; color: #0a4f6e; density: 0.12"
         cursor="rayOrigin: mouse" raycaster="objects: .clickable">

<!-- ASSETS -->
<a-assets>
    <a-asset-item id="jellyfishModel" src="blue_jellyfish.glb"></a-asset-item>
    <a-asset-item id="clownFishModel" src="clown_fish_low_poly_animated.glb"></a-asset-item>
    <a-asset-item id="doryModel" src="baby_dory_in_finding_dory.glb"></a-asset-item>
</a-assets>

<!-- SKY (brighter ocean tone) -->
<a-sky color="#1e6f8f"></a-sky>

<!-- LIGHTING (more natural underwater) -->
<a-light type="ambient" intensity="1.0" color="#a8e6ff"></a-light>
<a-light type="directional" intensity="0.6" position="0 10 5" color="#ffffff"></a-light>

<!-- CAMERA -->
<a-camera position="0 2 10">
    <a-cursor></a-cursor>
</a-camera>

<!-- WATER FLOOR -->
<a-plane rotation="-90 0 0" width="100" height="100" color="#013220"></a-plane>

<!-- FISH ENVIRONMENT -->
<a-entity position="0 2 -5">

    <!-- JELLYFISH -->
    <a-gltf-model src="#jellyfishModel"
        class="clickable"
        position="-3 2 -2"
        scale="1.5 1.5 1.5"
        animation="property: position; dir: alternate; dur: 4000; loop: true; to: -3 4 -2">
    </a-gltf-model>

    <!-- CLOWN FISH (FIXED SIZE) -->
    <a-gltf-model src="#clownFishModel"
        class="clickable"
        position="2 1 -2"
        scale="8 8 8"
        animation="property: position; dir: alternate; dur: 5000; loop: true; to: -2 1 -4">
    </a-gltf-model>

    <!-- BABY DORY (FORCED VISIBILITY FIX) -->
    <a-gltf-model id="doryModelEntity"
        src="#doryModel"
        class="clickable"
        position="0 1 -3"
        scale="12 12 12"
        rotation="0 180 0"
        animation="property: position; dir: alternate; dur: 6000; loop: true; to: 2 1 -5">
    </a-gltf-model>

</a-entity>

</a-scene>

<script>

// INTERACTION
document.querySelector('a-scene').addEventListener('loaded', () => {

    document.querySelectorAll(".clickable").forEach(el => {

        el.addEventListener("click", () => {

            const colors = ["#00f2ff", "#ff00ff", "#7b00ff", "#f5d300"];
            const c = colors[Math.floor(Math.random() * colors.length)];

            el.setAttribute("material", "color", c);
            el.setAttribute("material", "emissive", c);

            el.setAttribute("animation__scale", {
                property: "scale",
                to: "1.3 1.3 1.3",
                dur: 200,
                dir: "alternate"
            });

        });

    });

});


// REMOVE LARGE UNWANTED MESHES (BUT KEEP DORY SAFE)
document.querySelectorAll('a-gltf-model').forEach(model => {

    model.addEventListener('model-loaded', () => {

        const obj = model.getObject3D('mesh');
        if (!obj) return;

        obj.traverse((node) => {

            if (node.isMesh) {

                // Skip Dory (important fix)
                if (model.id === "doryModelEntity") return;

                const box = new THREE.Box3().setFromObject(node);
                const size = new THREE.Vector3();
                box.getSize(size);

                if (size.x > 50 || size.y > 50 || size.z > 50) {
                    node.visible = false;
                }

            }

        });

    });

});

</script>

</body>
</html>
